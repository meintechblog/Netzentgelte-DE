services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: netzentgelte-postgres
    environment:
      POSTGRES_DB: netzentgelte
      POSTGRES_USER: netzentgelte_app
      POSTGRES_PASSWORD: netzentgelte_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
